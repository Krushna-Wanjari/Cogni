<h2>Courses</h2>

<input [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" placeholder="Search courses..." />

<p *ngIf="loading$ | async">Loading courses...</p>
<p class="error" *ngIf="error$ | async as error">{{ error }}</p>

<ng-container *ngIf="(loading$ | async) === false">
  <div *ngIf="(courses$ | async)?.length; else noCourses">
    <app-course-card
      *ngFor="let course of courses$ | async; trackBy: trackByCourseId"
      [course]="course"
      (enrollRequested)="onEnroll($event)"
      (click)="viewCourse(course.id)">
    </app-course-card>
  </div>
  <ng-template #noCourses>
    <p>No courses available.</p>
  </ng-template>
</ng-container>

<p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
