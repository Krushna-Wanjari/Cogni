<h1>{{ portalName }}</h1>
<p>Browse courses, enroll, and track your academic progress all in one place.</p>

<div class="stats">
  <div>Courses Available: {{ coursesCount }}</div>
  <div>Enrolled: 3</div>
  <div>GPA: 3.8</div>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p *ngIf="message">{{ message }}</p>

<div class="search">
  <input [(ngModel)]="searchTerm" placeholder="Search courses..." />
  <p>Searching for: {{ searchTerm }}</p>
</div>
